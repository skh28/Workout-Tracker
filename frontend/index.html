<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Workout Tracker</h1>
      <button type="button" id="logout-btn" class="btn btn-ghost" hidden>Log out</button>
    </header>

    <main>
      <!-- Auth: login / register / forgot / reset -->
      <section id="auth-section" class="card auth-card">
        <div class="tabs">
          <button type="button" class="tab active" data-tab="login">Log in</button>
          <button type="button" class="tab" data-tab="register">Register</button>
        </div>

        <form id="login-form" class="auth-form">
          <input type="email" name="username" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit" class="btn btn-primary">Log in</button>
          <p class="forgot-link">
            <button type="button" id="forgot-password-btn" class="btn-link">Forgot password?</button>
          </p>
        </form>

        <form id="forgot-password-form" class="auth-form hidden">
          <input type="email" name="email" placeholder="Email" required />
          <button type="submit" class="btn btn-primary">Send reset link</button>
          <button type="button" id="forgot-back-btn" class="btn btn-ghost">Back to login</button>
        </form>
        <p id="forgot-message" class="muted" hidden></p>

        <form id="register-form" class="auth-form hidden">
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit" class="btn btn-primary">Create account</button>
        </form>

        <p id="auth-error" class="error" hidden></p>

        <div id="reset-password-card" class="card auth-form hidden">
          <h2>Set new password</h2>
          <form id="reset-password-form">
            <input type="password" name="new_password" placeholder="New password" required minlength="8" />
            <input type="password" name="confirm_password" placeholder="Confirm new password" required />
            <button type="submit" class="btn btn-primary">Reset password</button>
          </form>
          <p id="reset-password-error" class="error" hidden></p>
        </div>
      </section>

      <!-- Dashboard: workouts -->
      <section id="dashboard-section" class="dashboard hidden">
        <div class="card form-card">
          <h2>Log a workout</h2>
          <form id="workout-form">
            <input type="text" name="name" placeholder="Name (e.g. Morning run)" required />
            <input type="text" name="description" placeholder="Description (optional)" />
            <input type="datetime-local" name="started_at" required />
            <input type="number" name="duration_minutes" placeholder="Duration (minutes)" min="1" required />
            <input type="number" name="avg_heart_rate_bpm" placeholder="Avg heart rate (bpm)" min="0" />
            <input type="number" name="active_calories" placeholder="Active calories" min="0" />
            <input type="number" name="total_calories" placeholder="Total calories" min="0" />
            <button type="submit" class="btn btn-primary">Add workout</button>
          </form>
          <p id="workout-error" class="error" hidden></p>
        </div>

        <div id="edit-workout-card" class="card form-card hidden">
          <h2>Edit workout</h2>
          <form id="workout-edit-form">
            <input type="hidden" name="id" />
            <input type="hidden" name="workout_type" />
            <input type="text" name="name" placeholder="Name" required />
            <input type="text" name="description" placeholder="Description (optional)" />
            <input type="datetime-local" name="started_at" required />
            <input type="number" name="duration_minutes" placeholder="Duration (minutes)" min="1" required />
            <input type="number" name="avg_heart_rate_bpm" placeholder="Avg heart rate (bpm)" min="0" />
            <input type="number" name="active_calories" placeholder="Active calories" min="0" />
            <input type="number" name="total_calories" placeholder="Total calories" min="0" />
            <button type="submit" class="btn btn-primary">Save changes</button>
            <button type="button" id="edit-cancel-btn" class="btn btn-ghost">Cancel</button>
          </form>
          <p id="workout-edit-error" class="error" hidden></p>
        </div>

        <div class="card list-card">
          <h2>Your workouts</h2>
          <ul id="workouts-list"></ul>
          <p id="workouts-empty" class="muted">No workouts yet. Add one above.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
